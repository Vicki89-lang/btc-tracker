<!DOCTYPE html>                                             
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white p-4">

    <!-- Header / Selector -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold">Market Dashboard</h1>
<select id="symbolSelect" class="bg-gray-800 border border-gray-700 p-2 rounded mt-2">    <option value="bitcoin">Bitcoin</option>
    <option value="ethereum">Ethereum</option>
    <option value="solana">Solana</option>
    <option value="doge">Dogecoin</option>
</select>
    </div>

    <!-- Main Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Chart Section -->
        <div class="md:col-span-2 bg-gray-800 p-6 rounded-2xl shadow-xl">
            <h2 class="text-xl font-bold mb-4">Price Action</h2>
            <div class="relative h-64 w-full">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- News/Stats Section -->
        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
            <h2 class="text-xl font-bold mb-4">Latest News</h2>
            <p class="text-gray-400 text-sm">Market volatility remains high due to global economic shifts...</p>
        </div>
    </div>

    <script>
        let myChart;
        async function updateChart() {
            const symbol = document.getElementById('symbolSelect').value;
            const response = await fetch(`/api/data/${symbol}`);
            const data = await response.json();

            const ctx = document.getElementById('chart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: [{
                        label: 'Price (USD)',
                        data: data.prices,
                        borderColor: '#10B981', // Green color
                        tension: 0.3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        document.getElementById('symbolSelect').addEventListener('change', updateChart);
        updateChart(); // Load on start
    </script>
</body>
</html>
